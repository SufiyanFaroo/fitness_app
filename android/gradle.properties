# 🚀 Optimizing memory parameters to prevent daemon crashes
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError

# Stop daemon from hogging memory in background after compilation fails
org.gradle.daemon=false

# Keep existing AndroidX compliance configs intact
android.useAndroidX=true
android.enableJetifier=true