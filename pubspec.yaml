name: fitness_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.7 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Charts
  fl_chart: ^1.1.1
  cupertino_icons: ^1.0.8

  # State Management & Storage
  provider: ^6.1.1
  shared_preferences: ^2.2.2

  # Media Players
  video_player: ^2.8.1
  chewie: ^1.7.1

  # Image Picking & Services
  image_picker: ^1.2.2
  share_plus: ^12.0.2
  image_cropper: ^12.1.0 # Updated for compatibility
  path: ^1.9.0
  dio: ^5.4.1
  http: ^1.2.0
  path_provider: ^2.1.2

  # Firebase
  firebase_core: ^3.5.0
  cloud_firestore: ^5.4.3
  firebase_auth: ^5.3.0
  firebase_storage: ^12.3.1
  firebase_analytics: ^11.3.2
  firebase_messaging: ^15.1.2
  flutter_local_notifications: ^17.2.2

  # Social Auth & Utils
  flutter_facebook_auth: ^7.1.5
  google_sign_in: ^6.2.1
  intl: ^0.19.0 # Stable version
  confetti: ^0.7.0
  camera: ^0.11.0
  cached_network_image: ^3.4.1
  gal: ^2.3.2
  url_launcher: ^6.3.2
  crypto: ^3.0.7
  shimmer: ^3.0.0
  flutter_image_compress: ^2.4.0
  image_gallery_saver_plus: ^4.0.1
  just_audio: ^0.10.5
  audioplayers: ^6.6.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    color: "#ffffff"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/left.png
    - assets/images/right.png
    - assets/images/pick1.png
    - assets/svgs/
